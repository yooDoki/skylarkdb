name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
      packages: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: skylarkdb/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: skylarkdb/src-tauri

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        working-directory: skylarkdb
        run: npm ci

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./skylarkdb
          includeRelease: ${{ github.ref_type == 'tag' }}
          includeDebug: ${{ github.ref_type != 'tag' }}
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || '' }}
          releaseDraft: false

  update-latest-json:
    name: Update latest.json
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Get version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

      - name: Get release assets
        id: assets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail

          RELEASE_ASSETS_JSON="$(gh release view ${{ steps.get_version.outputs.tag }} --json assets)"

          # Prefer deterministic matching by filename tokens, not "first match".
          # We match both the payload asset and its .sig sidecar.
          # gh release view --json assets exposes download URL as .url (not GitHub API's .browser_download_url)
          get_url_by_name_regex() {
            local name_regex="$1"
            echo "$RELEASE_ASSETS_JSON" | jq -r --arg re "$name_regex" '
              .assets[]
              | select(.name | test($re))
              | .url
            ' | head -n 1
          }

          get_name_by_url_regex() {
            local name_regex="$1"
            echo "$RELEASE_ASSETS_JSON" | jq -r --arg re "$name_regex" '
              .assets[]
              | select(.name | test($re))
              | .name
            ' | head -n 1
          }

          read_sig_from_url() {
            local sig_url="$1"
            if [ -z "${sig_url:-}" ] || [ "$sig_url" = "null" ]; then
              echo ""
              return 0
            fi
            curl -fsSL "$sig_url" | tr -d '\n\r'
          }

          export_pair() {
            local key_prefix="$1"
            local asset_name_re="$2"
            local sig_name_re="$3"

            local url sig_url sig
            url="$(get_url_by_name_regex "$asset_name_re" || true)"
            sig_url="$(get_url_by_name_regex "$sig_name_re" || true)"
            sig="$(read_sig_from_url "$sig_url")"

            if [ -n "${url:-}" ] && [ "$url" != "null" ]; then
              echo "${key_prefix}_url=$url" >> $GITHUB_OUTPUT
              echo "${key_prefix}_signature=$sig" >> $GITHUB_OUTPUT
              echo "${key_prefix}_asset_name=$(get_name_by_url_regex "$asset_name_re" || true)" >> $GITHUB_OUTPUT
              echo "${key_prefix}_sig_asset_name=$(get_name_by_url_regex "$sig_name_re" || true)" >> $GITHUB_OUTPUT
            fi
          }

          # macOS updater payload is .app.tar.gz. Support both Apple Silicon and Intel if present.
          # IMPORTANT: do NOT use plain "x64" alone — it matches inside "aarch64" and will steal the ARM asset for darwin-x86_64.
          # Common names: SkylarkDB_aarch64.app.tar.gz / SkylarkDB_x64.app.tar.gz / SkylarkDB_*_x86_64.app.tar.gz
          export_pair "darwin_aarch64" "(^|/)SkylarkDB_.*(aarch64|arm64).*\\.app\\.tar\\.gz$" "(^|/)SkylarkDB_.*(aarch64|arm64).*\\.app\\.tar\\.gz\\.sig$"
          export_pair "darwin_x86_64" "(^|/)SkylarkDB_(?!.*aarch64)(?!.*arm64).*(x86_64|amd64|_x64\\.).*\\.app\\.tar\\.gz$" "(^|/)SkylarkDB_(?!.*aarch64)(?!.*arm64).*(x86_64|amd64|_x64\\.).*\\.app\\.tar\\.gz\\.sig$"

          # Windows prefer MSI; common: SkylarkDB_0.2.0_x64_en-US.msi
          export_pair "windows_x86_64" "(^|/)SkylarkDB_.*(x86_64|x64|amd64).*\\.msi$" "(^|/)SkylarkDB_.*(x86_64|x64|amd64).*\\.msi\\.sig$"

          # Linux prefer AppImage; common: SkylarkDB_0.2.0_amd64.AppImage
          export_pair "linux_x86_64" "(^|/)SkylarkDB_.*(x86_64|x64|amd64).*\\.AppImage$" "(^|/)SkylarkDB_.*(x86_64|x64|amd64).*\\.AppImage\\.sig$"

      - name: Update latest.json
        run: |
          set -euo pipefail

          # Fail fast if signatures are missing for platforms that have URLs.
          if [ -n "${{ steps.assets.outputs.darwin_aarch64_url }}" ] && [ -z "${{ steps.assets.outputs.darwin_aarch64_signature }}" ]; then
            echo "ERROR: macOS (aarch64) updater signature missing. asset=${{ steps.assets.outputs.darwin_aarch64_asset_name }} sig=${{ steps.assets.outputs.darwin_aarch64_sig_asset_name }}" >&2
            exit 1
          fi
          if [ -n "${{ steps.assets.outputs.darwin_x86_64_url }}" ] && [ -z "${{ steps.assets.outputs.darwin_x86_64_signature }}" ]; then
            echo "ERROR: macOS (x86_64) updater signature missing. asset=${{ steps.assets.outputs.darwin_x86_64_asset_name }} sig=${{ steps.assets.outputs.darwin_x86_64_sig_asset_name }}" >&2
            exit 1
          fi
          if [ -n "${{ steps.assets.outputs.windows_x86_64_url }}" ] && [ -z "${{ steps.assets.outputs.windows_x86_64_signature }}" ]; then
            echo "ERROR: Windows updater signature missing. asset=${{ steps.assets.outputs.windows_x86_64_asset_name }} sig=${{ steps.assets.outputs.windows_x86_64_sig_asset_name }}" >&2
            exit 1
          fi
          if [ -n "${{ steps.assets.outputs.linux_x86_64_url }}" ] && [ -z "${{ steps.assets.outputs.linux_x86_64_signature }}" ]; then
            echo "ERROR: Linux updater signature missing. asset=${{ steps.assets.outputs.linux_x86_64_asset_name }} sig=${{ steps.assets.outputs.linux_x86_64_sig_asset_name }}" >&2
            exit 1
          fi

          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          NOTES=$'## SkylarkDB v${{ steps.get_version.outputs.version }}\n\n请查看 Release 页面获取详细更新内容。'
          jq -n \
            --arg version "${{ steps.get_version.outputs.version }}" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg darwin_aarch64_url "${{ steps.assets.outputs.darwin_aarch64_url }}" \
            --arg darwin_aarch64_sig "${{ steps.assets.outputs.darwin_aarch64_signature }}" \
            --arg darwin_x86_64_url "${{ steps.assets.outputs.darwin_x86_64_url }}" \
            --arg darwin_x86_64_sig "${{ steps.assets.outputs.darwin_x86_64_signature }}" \
            --arg windows_x86_64_url "${{ steps.assets.outputs.windows_x86_64_url }}" \
            --arg windows_x86_64_sig "${{ steps.assets.outputs.windows_x86_64_signature }}" \
            --arg linux_x86_64_url "${{ steps.assets.outputs.linux_x86_64_url }}" \
            --arg linux_x86_64_sig "${{ steps.assets.outputs.linux_x86_64_signature }}" \
            '
            {
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: (
                {}
                | if (($darwin_aarch64_url | length) > 0 and ($darwin_aarch64_sig | length) > 0) then .["darwin-aarch64"] = { url: $darwin_aarch64_url, signature: $darwin_aarch64_sig } else . end
                | if (($darwin_x86_64_url | length) > 0 and ($darwin_x86_64_sig | length) > 0) then .["darwin-x86_64"] = { url: $darwin_x86_64_url, signature: $darwin_x86_64_sig } else . end
                | if (($windows_x86_64_url | length) > 0 and ($windows_x86_64_sig | length) > 0) then .["windows-x86_64"] = { url: $windows_x86_64_url, signature: $windows_x86_64_sig } else . end
                | if (($linux_x86_64_url | length) > 0 and ($linux_x86_64_sig | length) > 0) then .["linux-x86_64"] = { url: $linux_x86_64_url, signature: $linux_x86_64_sig } else . end
              )
            }
            ' > latest.json

          if ! jq -e '.platforms | length > 0' latest.json >/dev/null; then
            echo "ERROR: latest.json has no platforms with non-empty url and signature (nothing to ship)" >&2
            exit 1
          fi

      - name: Upload latest.json to Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          gh release upload ${{ steps.get_version.outputs.tag }} latest.json --clobber
