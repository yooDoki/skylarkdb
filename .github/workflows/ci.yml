name: CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_ENV: production

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
      packages: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: skylarkdb/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: skylarkdb/src-tauri
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        working-directory: skylarkdb
        run: |
          echo "Installing dependencies..."
          npm ci --verbose
          echo "Dependencies installed successfully"

      - name: Build debug artifacts
        if: github.ref_type != 'tag'
        working-directory: skylarkdb
        run: |
          echo "Building debug artifacts..."
          npm run tauri:build -- --debug --verbose
          echo "Debug build completed"

      - name: Build and publish release
        if: github.ref_type == 'tag'
        uses: tauri-apps/tauri-action@v0.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./skylarkdb
          tagName: ${{ github.ref_name }}
          releaseName: Release ${{ github.ref_name }}
          releaseDraft: false
          includeUpdaterJson: true

      - name: Verify updater assets
        if: github.ref_type == 'tag'
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            console.log(`Verifying release assets for tag: ${tag}`)
            
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              })

              const assetNames = release.assets.map((asset) => asset.name)
              console.log(`Release assets: ${assetNames.join(', ')}`)

              const hasLatestJson = assetNames.includes('latest.json')
              const hasSignature = assetNames.some((name) => name.endsWith('.sig'))
              const hasAppAssets = assetNames.some((name) => 
                name.endsWith('.dmg') || 
                name.endsWith('.exe') || 
                name.endsWith('.AppImage') ||
                name.endsWith('.tar.gz')
              )

              console.log(`Verification results:`)
              console.log(`- latest.json: ${hasLatestJson}`)
              console.log(`- Signature files: ${hasSignature}`)
              console.log(`- App assets: ${hasAppAssets}`)

              if (!hasLatestJson || !hasSignature || !hasAppAssets) {
                core.setFailed(`Updater assets are incomplete for ${tag}. latest.json: ${hasLatestJson}, signature: ${hasSignature}, app assets: ${hasAppAssets}`)
              } else {
                console.log(`All required assets are present for tag: ${tag}`)
              }
            } catch (error) {
              console.error('Error verifying release assets:', error)
              core.setFailed(`Failed to verify release assets: ${error.message}`)
            }

      - name: Upload build artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: debug-builds-${{ matrix.platform }}
          path: |
            skylarkdb/src-tauri/target/debug/bundle/
          retention-days: 7
