name: CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
      packages: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: skylarkdb/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: skylarkdb/src-tauri

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        working-directory: skylarkdb
        run: npm ci

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Force Node.js 24 to avoid deprecation warnings
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          projectPath: ./skylarkdb
          includeRelease: ${{ github.ref_type == 'tag' }}
          includeDebug: ${{ github.ref_type != 'tag' }}
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || '' }}
          releaseDraft: false
          includeUpdaterJson: true
          args: --verbose

      - name: Verify updater assets
        if: github.ref_type == 'tag'
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag
            })

            const assetNames = release.assets.map((asset) => asset.name)
            core.info(`Release assets for ${tag}: ${assetNames.join(', ')}`)

            const hasLatestJson = assetNames.includes('latest.json')
            const hasSignature = assetNames.some((name) => name.endsWith('.sig'))

            if (!hasLatestJson || !hasSignature) {
              core.setFailed(`Updater assets are incomplete for ${tag}. latest.json: ${hasLatestJson}, signature: ${hasSignature}`)
            }
